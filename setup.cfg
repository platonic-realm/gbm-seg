[pycodestyle]
# E226 - missing whitespace around arithmetic operator
# E302 - expected 2 blank lines
# E41  - whitespace before parenthesis (and friends)
# E126 - continuation-line over-indented for hanging indent
# E501 - line too long
# E241 - multiple spaces after ':' (some dict literals are hand-aligned)
ignore = E226,E302,E41,E126,E501,E241

[flake8]
# Mirror [pycodestyle] so flake8 picks it up too.
ignore = E226,E302,E41,E126,E501,E241
max-line-length = 100
