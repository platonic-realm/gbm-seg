experiments:
  root: '/projects/ag-bozek/afatehi/gbm/experiments/'
  # root: '/home/afatehi/gbm/experiments/'

  # Informational lists — not consumed at runtime, just reminders of what
  # names the corresponding dispatch tables accept. Authoritative
  # registration is in src/models/__init__.py:MODEL_REGISTRY and
  # src/train/factory.py:_build_single_loss.
  models: ['unet_3d', 'swin_unetr']
  losses: ['CrossEntropy', 'Dice', 'IoU', 'Cont', 'Compound']

  scale_learning_rate_for_batch_size: False

  # default_data_path: '/projects/ag-bozek/afatehi/gbm/data/ds_human/'
  # default_data_path: '/home/afatehi/gbm/data/ds_mouse/'
  default_data_path: '/projects/ag-bozek/afatehi/gbm/dataset/ds_mouse/'
  default_batch_size: 3

  # Sub-directory names inside `default_data_path`, consumed by `gbm.py create`.
  #   ds_train_subdir          — training TIFFs (4-channel: image + label).
  #   ds_test_labeled_subdir   — held-out test crops WITH expert labels. Expects
  #                              one sub-sub-directory per annotator (e.g. Chris/
  #                              David/Robin), each holding the same crops as
  #                              4-channel TIFFs (channel 3 = that expert's label).
  #   ds_test_unlabeled_subdir — whole-glomerulus test volumes, 3-channel, no labels.
  # Set these to the actual on-disk names if they contain spaces / differ.
  ds_train_subdir: 'ds_train'
  ds_test_labeled_subdir: 'ds_test_labeled'
  ds_test_unlabeled_subdir: 'ds_test_unlabeled'

  # The training samples will resize to match this size
  default_voxel_size: [0.050, 0.050, 0.300]

  # Z-axis interpolation factor applied at `gbm.py create` time.
  # Channels 0-2 (nephrin, collagen-4, WGA) are trilinear-upsampled along
  # Z; the label channel is np.repeat'd, stacking each manual annotation
  # N times. The same value is written to the per-experiment configs.yaml
  # as `trainer.data.z_scale` and read by Factory.createTrainer to mask
  # validation metrics down to the *original* label positions only.
  # Set to 1 to disable interpolation entirely.
  default_z_scale: 6

trainer:
  model:
    # Model architecture. Dispatched via src/models/__init__.py:MODEL_REGISTRY.
    # Supported names:
    #   unet_3d    — convolutional 3D U-Net. Uses the unet_3d sub-block below.
    #                Default; conv-heavy, benefits from channels_last_3d on Ampere+.
    #   swin_unetr — anisotropic Swin-UNETR (attention + windowed self-attn). Uses the
    #                swin_unetr sub-block below for its own hyperparameters.
    # Both models are interface-compatible (same forward signature: (logits, results)),
    # so swapping the name is enough to switch architectures — no other config changes.
    name: swin_unetr

    # Unet3D-specific. Only consulted when name=unet_3d.
    # feature_maps is the channel count at each encoder depth (and
    # determines the decoder mirror). encoder_padding / decoder_padding accept
    # 'same' (output spatial dim = input), 'valid' (no padding; output shrinks), or
    # an int / tuple of ints for explicit per-axis padding.
    unet_3d:
      feature_maps: [64, 128, 256, 512]
      encoder_kernel: [3, 3, 3]
      encoder_padding: 'same'
      decoder_kernel: [3, 3, 3]
      decoder_padding: 'same'

      # Anisotropic Z handling. 'auto' derives the per-stage Z deduction from
      # the Z patch depth (encoder reduces Z to ~half over num_stages-1
      # merges); an explicit int overrides.
      z_deduction_per_stage: auto

    # SwinUNETR-specific. Only consulted when name=swin_unetr.
    swin_unetr:
      feature_size: 24             # base embed dim; channels double each stage
      depths: [2, 2, 2, 2]         # transformer blocks per encoder stage
      num_heads: [3, 6, 12, 24]    # attention heads per stage (paired with depths)
      window_size_xy: 7            # XY window size; Z window = current stage's Z
      mlp_ratio: 4.0
      qkv_bias: true
      drop_rate: 0.0
      attn_drop_rate: 0.0
      z_deduction_per_stage: auto  # 'auto' derives it from the Z patch depth; or an explicit int

  optimization:
    epochs: 10

    # Optimiser. Supported names:
    #   adam — Adam. Fields: lr (required). β1=0.9, β2=0.999 are PyTorch defaults
    #          and not exposed here (add to the factory if needed). Adaptive
    #          per-parameter step size makes Adam robust to a wide LR range;
    #          pairs well with `scheduler: none` for short runs.
    #   sgd  — SGD with momentum. Fields: lr (required), momentum (default 0.99),
    #          weight_decay (default 0.0), nesterov (default False). nnU-Net's
    #          empirical default for medical segmentation; pairs naturally with
    #          poly_decay scheduler since SGD benefits more from LR scheduling.
    optim:
      name: adam
      lr: 0.0001

    # LR scheduler. Supported names:
    #   poly_decay         — nnU-Net's polynomial: lr_t = lr_0 * (1 - t/T)^power.
    #                        Fields: total_iters (default = trainer.optimization.epochs),
    #                        power (default 0.9). Stepped per validation cycle (i.e. once
    #                        every report_freq training steps), so `total_iters`
    #                        should be in *cycle* units. Example: 10 epochs at
    #                        report_freq=500 with ~13000 steps/run ≈ 26 cycles, so
    #                        total_iters=26 means LR reaches 0 at run end.
    #                        Proactive: shrinks LR every cycle regardless of loss.
    #                        Standard medical-segmentation choice.
    #   reduce_on_plateau  — Adaptive plateau detection. Fields: mode ('max' or
    #                        'min', default 'max'), factor (default 0.1), patience
    #                        (default 10). Stepped on validation Dice value.
    #                        Reactive: only kicks in when training stalls. Patience
    #                        is in *cycle* units.
    #   none               — Disable scheduling entirely. Equivalent: `scheduler: null`.
    #                        Useful when Adam's adaptive step sizing is enough on
    #                        its own (short runs, well-tuned base LR).
    # When changing scheduler type across a resume from a snapshot, the old
    # scheduler's state in the .pt is type-incompatible with the new one —
    # snapper.load() detects the mismatch and warns + skips the scheduler restore;
    # the new scheduler starts fresh from its config-driven defaults.
    scheduler:
      name: poly_decay
      power: 0.9
      # total_iters defaults to trainer.optimization.epochs if omitted, but for
      # any non-trivial run you'll want to set it to
      # (epochs × validation-cycles-per-epoch).
      # total_iters: 26

    # Loss function. `loss.name` selects the loss; the remaining keys under
    # `loss` are loss-specific parameters. Supported names (single-loss dispatch
    # in factory._build_single_loss):
    #   Cont         — Continuity loss: cont_alpha * CE + cont_beta * along-Z continuity
    #                  penalty. Fields: weights (per-class CE weights), cont_alpha
    #                  (default 0.7), cont_beta (default 0.3). The active default; the
    #                  continuity term penalises class-flips between adjacent Z slices.
    #   CrossEntropy — Plain weighted cross-entropy. Fields: weights.
    #   Dice         — Soft Dice loss across classes. No extra fields.
    #   IoU          — Soft IoU (Jaccard) loss. No extra fields.
    #   Compound     — Weighted sum of multiple single-losses. Reads the `compound`
    #                  list with entries `{name: <single-loss>, weight: <float>, params: {…}}`.
    #                  Example:
    #                    loss:
    #                      name: Compound
    #                      compound:
    #                        - {name: CrossEntropy, weight: 0.5}
    #                        - {name: Dice,         weight: 0.5}
    loss:
      name: Cont
      weights: [3.0, 7.0]
      # ContLoss-only fields (consulted iff name=Cont). Defaults approximate the
      # prior learned-weight initialisation equilibrium.
      cont_alpha: 0.7
      cont_beta: 0.3

    # Deep supervision (C1.2): when enabled, the Unet3D model attaches
    # `levels` auxiliary 1x1x1 conv heads at decoder mid-levels (deepest
    # first). The loss is computed at each level against a downsampled
    # copy of the labels and summed with geometrically-decaying weights.
    # Disabled by default; enable for an ablation arm. If `weights` is
    # omitted, defaults to a normalised 0.5^k schedule.
    deep_supervision:
      enabled: False
      levels: 2
      # weights: [0.571, 0.286, 0.143]   # explicit override (normalised)

  data:
    train_ds:
      path: ./data/gbm_train_ds/
      batch_size: 8  # overridden at gbm.py create from experiments.default_batch_size
      sample_dimension: [24, 256, 256] # Z, X, Y
      # Pixel strides chosen for regularization: with the Z×6 stacking each
      # original-label voxel already appears in many patches at stride [1,64,64].
      # Bigger strides → less redundant exposure per training step → slower
      # overfit on the dataset's high intrinsic redundancy.
      pixel_stride: [12, 128, 128] # Z, X, Y
      pin_memory: True
      shuffle: True
      ignore_stride_mismatch: True
      workers: 4
      augmentation:
        # Offline aug precomputes _zoom/_twist/_rotate variants to disk; with
        # the gbm.py create Z×6 stacking each "unique" anatomy is already
        # replicated 6× in the labels, so precomputed aug compounds redundancy
        # and pushes the model toward overfitting. Default off; flip on for
        # ablations where the trade-off is worth measuring.
        enabled_offline: True
        workers: 8
        # Offline aug recipes. Each entry is [<method>, <param>]:
        #   _zoom <factor>           — affine scale; factor>1 zooms in, <1 zooms out.
        #   _twist_clock <strength>  — rotational shear along Z (clockwise).
        #   _twist_reverse <strength> — counter-clockwise twist.
        #   _rotate_random <prob>    — random in-plane rotation; param ignored
        #                              (chance handled in the online block).
        methods_offline: [
                          ['_zoom', 1.7],
                          ['_zoom', 1.3],
                          ['_zoom', 0.7],
                          ['_twist_clock', '0.5',],
                          ['_twist_reverse', '0.5'],
                          ['_rotate_random', '0.2'],
                         ]
        enabled_online: True
        # Online aug — applied per-batch on the fly. `rotate`, `blur`, `crop`,
        # `channel_drop` are probabilities (0..1) that the augmentation fires
        # on a given patch.
        #   rotate         — random rotation about all 3 axes (propagates
        #                     high-res XY detail into the low-res Z).
        #   rotate_degrees — max rotation angle; each axis draws a random
        #                     0..rotate_degrees deg (a count, not a probability).
        #   blur           — Gaussian blur (sigma=2).
        #   crop           — random crop + zero-pad.
        #   channel_drop   — zero-out one of the three input channels.
        # `scale` is the Z-upsampling factor used during sample selection;
        # must match `experiments.default_z_scale` set at gbm.py create.
        methods_online:
          scale: 6
          rotate: 0.2
          rotate_degrees: 45
          blur: 0.2
          crop: 0.2
          channel_drop: 0.3

    valid_ds:
      path: ./data/gbm_valid_ds/
      batch_size: 8
      sample_dimension: [24, 256, 256] # Z, X, Y
      # Stride equals sample_dimension on every axis, so validation patches
      # tile the volume exactly once with no overlap — fastest validation
      # pass. Metrics are masked to original Z positions regardless (see
      # Unet3DTrainer._select_real_z).
      pixel_stride: [24, 256, 256] # Z, X, Y
      pin_memory: True
      shuffle: False
      ignore_stride_mismatch: True
      workers: 8

    # z_scale is NOT set in this template — it is injected into the
    # per-experiment configs.yaml by `gbm.py create` (the value comes from
    # `experiments.default_z_scale` or the `--z-scale` CLI flag).
    # Factory.createTrainer reads it to mask validation metrics to
    # original-label slices only.

  runtime:
    dp: False
    # DistributedDataParallel — opt-in alternative to DP. When True, training
    # must be launched under `torchrun` (the `sbatch/train_*` DDP launchers
    # handle this). DDP takes precedence over DP when both flags are set.
    # Unlike DP, DDP scales near-linearly across the GPUs and supports
    # torch.compile + cudnn.benchmark. Mutually exclusive with the in-process
    # all-folds orchestrator — submit one sbatch per fold via
    # `sbatch/submit_cv_ddp.sh`.
    ddp: True
    # Compute device. Supported:
    #   cuda — GPU (training default). Required for DDP / compile.
    #   cpu  — useful only for tests or smoke checks; very slow for training.
    device: cuda
    mixed_precision: True
    # SwinUNETR-only: gradient (activation) checkpointing — trades ~25-35%
    # extra compute for a large drop in activation memory. 'auto' enables it
    # when the GPU is too small for the un-checkpointed model (40 GB A100 /
    # 32 GB V100) and leaves it off on the 80 GB A100; 'on'/'off' force it.
    gradient_checkpointing: 'on'
    # cudnn.benchmark trades determinism for ~5-15% throughput; only honoured
    # under DDP (single-process mode keeps the seed_everything determinism
    # guarantee).
    cudnn_benchmark: False
    # Channels-last 3D memory format. Can help conv-heavy models on Ampere+
    # GPUs; safe no-op when the model doesn't benefit. DDP-only.
    channels_last_3d: False

    # JIT-compile the model via torch.compile(). Works cleanly with DDP. With
    # DataParallel it's wrap-then-compile-the-inner-module (Factory handles).
    compile: False

  logging:
    # Weights & Biases experiment tracking (E2). Disabled by default;
    # enable per-run for cross-experiment comparison. The full configs
    # dict is logged as wandb.config so every ablation axis is filterable.
    # Requires `pip install wandb` and a `wandb login` (or WANDB_API_KEY env
    # var); silently skipped with a warning if wandb is absent.
    wandb:
      enabled: True
      project: gbm-ablation
      entity: gbm-project  # personal entity is admin-disabled; use team handle
      run_name: null       # null → wandb auto-generates a name

    report_freq: 1000

    # Metrics logged per validation cycle. Supported names (computed in
    # src/utils/metrics/clfication.py:Metrics; pick any subset):
    #   Loss                     — the configured training loss value.
    #   TruePositiveRate         — TP / (TP + FN) = sensitivity / recall.
    #   PositivePredictiveValue  — TP / (TP + FP) = precision.
    #   Dice                     — 2·TP / (2·TP + FP + FN). The canonical CV metric;
    #                              also what ReduceLROnPlateau steps on.
    #   JaccardIndex             — TP / (TP + FP + FN) = IoU.
    metrics: [
              'Loss',
              'TruePositiveRate',
              'PositivePredictiveValue',
              'Dice',
              'JaccardIndex',
             ]

    # Per-class subset for the binary metrics above. Default [1] reports the
    # foreground (GBM) class only — background numbers are usually trivial.
    metrics_class_ids: [1]

    snapshot_path: ./snapshots/
    result_path: ./results-train/

    visualization:
      enabled: True
      # The chance for a batch to create visualization
      chance: 0.30
      path: ./visuals/
      gif: True
      tif: False

inference:
  number_class: 2
  snapshot_path: ''
  device: cuda
  interpolate: True

  # Sliding-window stitching mode for overlapping inference patches.
  # Supported:
  #   gaussian      — softmax probabilities + 3D Gaussian window (sigma=patch/8).
  #                   nnU-Net default; recommended for new experiments.
  #   hann          — softmax probabilities + 3D Hann window. Parameter-free,
  #                   sharper rolloff than Gaussian.
  #   flat_softmax  — softmax probabilities + uniform window. Diagnostic baseline.
  #   sum_logits    — sum raw logits with uniform window (legacy pre-A3 behaviour;
  #                   preserved for backwards-compat with old experiments).
  stitching: gaussian

  post_processing:
    enabled: True
    min_2d_size: 500       # drop 2D components smaller than this (px)
    min_3d_size: 5000      # drop 3D components smaller than this (voxels)
    kernel_size: 3         # erosion kernel for the per-slice opening-by-reconstruction
    # Hole-filling — fill enclosed background regions below the threshold.
    # 0 disables it. Keep well below a capillary-lumen cross-section so a
    # real lumen is never filled.
    max_2d_hole_size: 64   # per-slice pinhole fill (px); 0 = off
    max_3d_hole_size: 0    # 3D cavity fill (voxels); 0 = off
    # 3D reconnect — drop components detached from the main GBM body.
    # Dilate by reconnect_radius to bridge the model's fragmentation gaps,
    # keep the largest reconnected structure plus any component >=
    # keep_fraction of it, then intersect back. 0 disables it.
    reconnect_radius: 8    # dilation radius bridging fragmentation gaps; 0 = off
    keep_fraction: 0.2     # also keep components >= this fraction of the largest

  morph:
    kernel_ave_size: 5
    # Thickness values above this (nm) are considered unrealistic and clipped to 0 by `gbm.py stats --clipping`.
    thickness_clip_max: 1400

  result_path: ''

  # Whole-glomerulus test set (no labels) — consumed by `gbm.py infer` and the
  # downstream psp/morph/stats pipeline. Populated by `gbm.py create` from
  # `experiments.ds_test_unlabeled_subdir`.
  inference_ds:
    path: ''
    batch_size: 8
    sample_dimension: [12, 256, 256]
    pixel_stride: [1, 64, 64]
    pin_memory: True
    scale_factor: 6
    workers: 8

  # Held-out test crops WITH expert labels — consumed by `gbm.py eval-test`
  # (Stage C). `path` points at a directory of per-annotator sub-directories.
  # Populated by `gbm.py create` from `experiments.ds_test_labeled_subdir`.
  labeled_test_ds:
    path: ''

logging:
  # Logging verbosity. Standard logging-module levels:
  #   DEBUG, INFO, WARNING, ERROR, CRITICAL.
  log_level: DEBUG
  log_file: logs/train.log
  log_std: True
  log_summary: False

# All other paths are relative to root_path
root_path: './'
