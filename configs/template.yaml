experiments:
  root: '/projects/ag-bozek/afatehi/gbm/experiments/'
  # root: '/home/afatehi/gbm/experiments/'
  models: ['unet_3d', 'swin_unetr']
  losses: [CrossEntropy, Dice, IoU]

  scale_lerning_rate_for_batch_size: True

  # default_data_path: '/projects/ag-bozek/afatehi/gbm/data/ds_human/'
  # default_data_path: '/home/afatehi/gbm/data/ds_mouse/'
  default_data_path: '/projects/ag-bozek/afatehi/gbm/dataset/ds_mouse/'
  default_batch_size: 20

  # The training samples will resize to match this size
  default_voxel_size: [0.050, 0.050, 0.300]

  # Z-axis interpolation factor applied at `gbm.py create` time.
  # Channels 0-2 (nephrin, collagen-4, WGA) are trilinear-upsampled along
  # Z; the label channel is np.repeat'd, stacking each manual annotation
  # N times. The same value is written to the per-experiment configs.yaml
  # as `trainer.z_scale` and read by Factory.createTrainer to mask
  # validation metrics down to the *original* label positions only.
  # Set to 1 to disable interpolation entirely.
  default_z_scale: 6

trainer:
  model:
    # name: dispatched through src/models/__init__.py:MODEL_REGISTRY.
    #   'unet_3d'    — convolutional 3D U-Net (feature_maps + encoder/decoder kernels below).
    #   'swin_unetr' — anisotropic Swin-UNETR variant; reads the swin_unetr sub-block.
    # Both models are interface-compatible (same input/output shape, same DS hook).
    name: unet_3d
    feature_maps: [64, 128, 256, 512]
    encoder_kernel: [3, 3, 3]
    encoder_padding: 'same'
    decoder_kernel: [3, 3, 3]
    decoder_padding: 'same'

    # SwinUNETR-specific hyperparameters. Only consulted when name=swin_unetr.
    swin_unetr:
      feature_size: 24             # base embed dim; channels double each stage
      depths: [2, 2, 2, 2]         # transformer blocks per encoder stage
      num_heads: [3, 6, 12, 24]    # attention heads per stage (paired with depths)
      window_size_xy: 7            # XY window size; Z window = current stage's Z
      mlp_ratio: 4.0
      qkv_bias: true
      drop_rate: 0.0
      attn_drop_rate: 0.0
      z_deduction_per_stage: 2     # matches Unet3D's pool kernel (3, 2, 2)

  epochs: 10

  # Optimiser. Supported names:
  #   adam  — keyword args: lr.
  #   sgd   — keyword args: lr, momentum (default 0.99), weight_decay (default 0.0), nesterov (default False).
  #           nnU-Net's empirical default for medical segmentation; pairs naturally with poly_decay scheduler.
  optim:
    name: adam
    lr : 0.0001

  # LR scheduler. Supported names:
  #   reduce_on_plateau  — fields: mode (max/min, default max), factor (default 0.1), patience (default 10). Stepped on validation Dice.
  #   poly_decay         — nnU-Net's (1 - t/T)^power. Fields: total_iters (default trainer.epochs), power (default 0.9). Stepped per validation cycle.
  # If this block is omitted entirely, defaults to reduce_on_plateau with mode=max (the prior behaviour).
  scheduler:
    name: reduce_on_plateau
    mode: max

  loss: Cont
  loss_weights: [3.0, 7.0]
  # ContLoss = cont_alpha * CE + cont_beta * continuity. Only consulted when loss=Cont.
  # Defaults approximate the prior learned-weight initialisation equilibrium.
  cont_alpha: 0.7
  cont_beta: 0.3

  # Weights & Biases experiment tracking (E2). Disabled by default;
  # enable per-run for cross-experiment comparison. The full configs
  # dict is logged as wandb.config so every ablation axis is filterable.
  # Requires `pip install wandb` and a `wandb login` (or WANDB_API_KEY env
  # var); silently skipped with a warning if wandb is absent.
  wandb:
    enabled: False
    project: gbm-seg
    entity: gbm-project  # personal entity is admin-disabled; use team handle
    run_name: null       # null → wandb auto-generates a name

  # Deep supervision (C1.2): when enabled, the Unet3D model attaches
  # `levels` auxiliary 1x1x1 conv heads at decoder mid-levels (deepest
  # first). The loss is computed at each level against a downsampled
  # copy of the labels and summed with geometrically-decaying weights.
  # Disabled by default; enable for an ablation arm. If `weights` is
  # omitted, defaults to a normalised 0.5^k schedule.
  deep_supervision:
    enabled: False
    levels: 2
    # weights: [0.571, 0.286, 0.143]   # explicit override (normalised)

  report_freq: 500

  metrics: [
            'Loss',
            'TruePositiveRate',
            'PositivePredictiveValue',
            'Dice',
            'JaccardIndex',
           ]

  metrics_class_ids: [1]

  snapshot_path: ./snapshots/
  result_path: ./results-train/

  train_ds:
    path: ./data/gbm_train_ds/
    batch_size: 8  # overridden at gbm.py create from experiments.default_batch_size
    sample_dimension: [12, 256, 256] # Z, X, Y
    # Pixel strides chosen for regularization: with the Z×6 stacking each
    # original-label voxel already appears in many patches at stride [1,64,64].
    # Bigger strides → less redundant exposure per training step → slower
    # overfit on the dataset's high intrinsic redundancy.
    pixel_stride: [4, 192, 192] # Z, X, Y
    pin_memory: True
    shuffle: True
    ignore_stride_mismatch: True
    workers: 4
    augmentation:
      # Offline aug precomputes _zoom/_twist/_rotate variants to disk; with
      # the gbm.py create Z×6 stacking each "unique" anatomy is already
      # replicated 6× in the labels, so precomputed aug compounds redundancy
      # and pushes the model toward overfitting. Default off; flip on for
      # ablations where the trade-off is worth measuring.
      enabled_offline: False
      workers: 8
      methods_offline: [
                        ['_zoom', 2],
                        ['_zoom', 1.7],
                        ['_zoom', 1.3],
                        ['_zoom', 0.7],
                        ['_zoom', 0.5],
                        ['_twist_clock', '0.5',],
                        ['_twist_reverse', '0.5'],
                        ['_rotate_random', '0.2'],
                       ]
      enabled_online: True
      methods_online: 
        scale: 6
        # Numbers are chance of happening
        rotate: 0.2
        blur: 0.2
        crop: 0.2
        channel_drop: 0.3

  valid_ds:
    path: ./data/gbm_valid_ds/
    batch_size: 8
    sample_dimension: [12, 256, 256] # Z, X, Y
    # Z stride matches `experiments.default_z_scale` so each z_start anchors
    # a distinct real-label set (validation metrics are masked to original
    # Z positions anyway — see Unet3DTrainer._select_real_z). XY stride
    # equals sample_dim so XY tiles cover the volume once with no overlap.
    # Trades ~24× validation-time speedup for slightly less spatial coverage.
    pixel_stride: [6, 256, 256] # Z, X, Y
    pin_memory: True
    shuffle: False
    ignore_stride_mismatch: True
    workers: 8

  visualization:
    enabled: True
    # The chance for a batch to create visualization
    chance: 0.30
    path: ./visuals/
    gif: True
    tif: False

  dp: True
  # DistributedDataParallel — opt-in alternative to DP. When True, training
  # must be launched via `sbatch/train_ddp.sbatch` (which wraps `torchrun
  # --nproc-per-node=N gbm.py train …`). DDP takes precedence over DP when
  # both flags are set. Unlike DP, DDP scales near-linearly across the
  # 4 GPUs and supports torch.compile + cudnn.benchmark.
  # Mutually exclusive with the in-process all-folds orchestrator —
  # submit one sbatch per fold via `sbatch/submit_cv_ddp.sh`.
  ddp: False
  device: cuda
  mixed_precision: True
  # cudnn.benchmark trades determinism for ~5-15% throughput; only honoured
  # under DDP (single-process mode keeps the seed_everything determinism
  # guarantee).
  cudnn_benchmark: False
  # Channels-last 3D memory format. Can help conv-heavy models on Ampere+
  # GPUs; safe no-op when the model doesn't benefit. DDP-only.
  channels_last_3d: False

  # JIT-compile the model via torch.compile(). Works cleanly with DDP. With
  # DataParallel it's wrap-then-compile-the-inner-module (Factory handles).
  compile: False

inference:
  number_class: 2
  snapshot_path: ''
  device: cuda
  interpolate: True

  # Sliding-window stitching mode for overlapping patches.
  # Options:
  #   gaussian      — softmax probabilities + 3D Gaussian window (sigma=patch/8). nnU-Net default; recommended for new experiments.
  #   hann          — softmax probabilities + 3D Hann window. Parameter-free, sharper rolloff.
  #   flat_softmax  — softmax probabilities + uniform window. Diagnostic baseline.
  #   sum_logits    — sum raw logits with uniform window (legacy behaviour; preserved for backwards-compat).
  stitching: gaussian

  post_processing:
    enabled: True
    min_2d_size: 500
    min_3d_size: 5000
    kernel_size: 3

  morph:
    kernel_ave_size: 5
    # Thickness values above this (nm) are considered unrealistic and clipped to 0 by `gbm.py stats --clipping`.
    thickness_clip_max: 1400

  result_dir: ''

  inference_ds:
    path: ''
    batch_size: 8
    sample_dimension: [12, 256, 256]
    pixel_stride: [1, 64, 64]
    pin_memory: True
    scale_factor: 6
    workers: 8

logging:
  log_level: DEBUG
  log_file: logs/train.log
  log_std: True
  log_summary: False

# All other pathes are relative to root_path
root_path: './'
