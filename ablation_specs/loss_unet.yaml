# Loss-function ablation — 3D U-Net.
#
# Compares 4 loss functions head-to-head under 5-fold subject-wise CV;
# everything else (architecture, optimiser, scheduler, augmentation) is
# fixed. `gbm.py ablate` materialises one experiment dir per cell
# (folds: [0] -> a single dir each); `sbatch/submit_cv_ddp.sh <cell> 5`
# then trains all 5 folds into that dir and aggregates them.
#
# Each cell overrides only `trainer.optimization.loss.name` — the
# loss-specific params (cont_alpha/cont_beta, weights) already live in the
# base config.
study: lossabl_unet
base_experiment: ablbase_unet
folds: [0]
cells:
  - {name: cont,         overrides: {trainer.optimization.loss.name: Cont}}
  - {name: dice,         overrides: {trainer.optimization.loss.name: Dice}}
  - {name: crossentropy, overrides: {trainer.optimization.loss.name: CrossEntropy}}
  - {name: iou,          overrides: {trainer.optimization.loss.name: IoU}}
