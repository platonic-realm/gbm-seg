# Deep-supervision ablation — pilot on fold 0.
# Run after loss + optim winners are known. Tests whether DS auxiliary
# heads at decoder mid-levels measurably improve segmentation quality.

study: ds_pilot
base_experiment: my_baseline

cells:
  - name: ds_off
    overrides:
      trainer.deep_supervision.enabled: false

  - name: ds_2_levels
    overrides:
      trainer.deep_supervision.enabled: true
      trainer.deep_supervision.levels: 2

  - name: ds_3_levels
    overrides:
      trainer.deep_supervision.enabled: true
      trainer.deep_supervision.levels: 3

folds: [0]
