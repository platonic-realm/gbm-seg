# Sequential-pinning loss ablation — pilot on fold 0.
# Run: `python gbm.py ablate ablation_specs/loss_pilot.yaml`
# Cells are created under `experiments.root` (from configs/template.yaml).
# After this pilot, edit `folds:` to [0, 1, 2, 3, 4] and re-run for the
# full mean±std numbers on the winner.

study: loss_pilot
base_experiment: my_baseline    # an existing experiment with configs.yaml + ds_train + fold_assignments.yaml

cells:
  - name: dice
    overrides:
      trainer.loss: Dice

  - name: ce
    overrides:
      trainer.loss: CrossEntropy

  - name: cont_default
    overrides:
      trainer.loss: Cont
      trainer.cont_alpha: 0.7
      trainer.cont_beta: 0.3

  - name: cont_ce_only
    overrides:
      trainer.loss: Cont
      trainer.cont_alpha: 1.0
      trainer.cont_beta: 0.0      # disables continuity term; CE only

  - name: cont_balanced
    overrides:
      trainer.loss: Cont
      trainer.cont_alpha: 0.5
      trainer.cont_beta: 0.5

folds: [0]
