# Sequential-pinning loss ablation — pilot on fold 0.
# Run: `python gbm.py ablate ablation_specs/loss_pilot.yaml`
# Cells are created under `experiments.root` (from configs/template.yaml).
# After this pilot, edit `folds:` to [0, 1, 2, 3, 4] and re-run for the
# full mean±std numbers on the winner.

study: loss_pilot
base_experiment: my_baseline    # an existing experiment with configs.yaml + ds_train + fold_assignments.yaml

# Maps to the catalog's A2 ablation:
#   (a) dice       = Dice only
#   (b) dice_ce    = Dice + CrossEntropy (compound)
#   (c) dice_cont  = Dice + Cont (CE+continuity); equivalent to current ContLoss + Dice
#   (d) dice_ce_continuity_fixed = Dice + CE + Cont(alpha=0, beta=1) — TV-on-softmax continuity, fixed weight
#   (e) tv_hard_mask = NOT IMPLEMENTED YET (needs a TV-on-argmaxed-mask loss class)
cells:
  - name: dice
    overrides:
      trainer.loss: Dice

  - name: dice_ce
    overrides:
      trainer.loss: Compound
      trainer.compound_loss:
        - {name: Dice, weight: 1.0}
        - {name: CrossEntropy, weight: 1.0}

  - name: dice_cont
    overrides:
      trainer.loss: Compound
      trainer.compound_loss:
        - {name: Dice, weight: 1.0}
        - {name: Cont, weight: 1.0,
           params: {cont_alpha: 0.7, cont_beta: 0.3}}

  - name: dice_ce_continuity_fixed
    overrides:
      trainer.loss: Compound
      trainer.compound_loss:
        - {name: Dice, weight: 1.0}
        - {name: CrossEntropy, weight: 1.0}
        # alpha=0 turns off the CE-component inside Cont so the only contribution
        # is the depth-adjacency continuity term, weighted independently here.
        - {name: Cont, weight: 0.3,
           params: {cont_alpha: 0.0, cont_beta: 1.0}}

folds: [0]
