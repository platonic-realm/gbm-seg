# Optimiser/scheduler ablation — pilot on fold 0.
# Run AFTER the loss pilot picks a winner; pin trainer.optimization.loss.name
# to that winner in `base_experiment` (re-use the loss_pilot winning cell,
# or update my_baseline's configs.yaml).

study: optim_pilot
base_experiment: my_baseline

cells:
  - name: adam_rlop
    overrides:
      trainer.optimization.optim.name: adam
      trainer.optimization.optim.lr: 1.0e-4
      trainer.optimization.scheduler.name: reduce_on_plateau
      trainer.optimization.scheduler.mode: max

  - name: sgd_poly
    overrides:
      trainer.optimization.optim.name: sgd
      trainer.optimization.optim.lr: 1.0e-2
      trainer.optimization.optim.momentum: 0.99
      trainer.optimization.scheduler.name: poly_decay
      trainer.optimization.scheduler.power: 0.9

folds: [0]
